<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickStop - Advanced Stopwatch | Web Development Portfolio</title>
  <meta name="description" content="Professional grade stopwatch application with lap timing, multiple themes, PWA support, and pixel-perfect animations. Built with vanilla HTML/CSS/JS.">
  <meta name="theme-color" content="#4facfe">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzIgMzIiIHZpZXdCb3g9IjAgMCAzMiAzMiIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iOCIgZmlsbD0iIzRGQUNGRSIvPgo8Y2lyY2xlIGN4PSIxNiIgY3k9IjExIiByPSI0IiBmaWxsPSIjRkZGIi8+CjxjaXJjbGUgY3g9IjE2IiBjeT0iMjEiIHI9IjgiIGZpbGw9IiNGRkYiIHN0cm9rZT0iIzNFMEZGNUIiIHN0cm9rZS13aWR0aD0iMSIvPgo8L3N2Zz4=">
  <style>
    /* Critical CSS for above-the-fold */
    .sw-root { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
  </style>
</head>
<body>
  <main class="sw-root" role="main" aria-label="Stopwatch application">
<h1 class="sw-title">QUICK<span>STOP</span></h1>
    
    <div class="clock-ring" role="timer" aria-live="polite">
      <svg viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="%234facfe"/>
            <stop offset="50%" stop-color="%23a78bfa"/>
            <stop offset="100%" stop-color="%23f472b6"/>
          </linearGradient>
          <linearGradient id="outer-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="%23e0f2ff"/>
            <stop offset="100%" stop-color="%23f3e8ff"/>
          </linearGradient>
        </defs>
        <circle cx="140" cy="140" r="138" fill="url(%23outer-grad)" opacity="0.5"/>
        <circle class="ring-track" cx="140" cy="140" r="120"/>
        <circle class="ring-progress" id="ring" cx="140" cy="140" r="120" transform="rotate(-90 140 140)"/>
        <g id="tick-marks"></g>
      </svg>
      <div class="clock-face">
        <div class="time-display" id="display" aria-label="Current time">00:00</div>
        <div class="time-ms" id="display-ms">.000</div>
        <div class="status-dot" id="status-dot" aria-label="Timer status"></div>
      </div>
    </div>

    <div class="btn-row" role="group" aria-label="Timer controls">
      <button class="btn btn-start" id="btn-start" aria-label="Start or pause timer">START</button>
      <button class="btn btn-lap" id="btn-lap" disabled aria-label="Record lap (only when running)">LAP</button>
      <button class="btn btn-reset" aria-label="Reset timer">RESET</button>
    </div>

    <div class="laps-panel" id="laps-panel" role="region" aria-label="Laps list">
      <div class="laps-header">
        <span>Lap</span><span>Split</span><span>Total</span><span></span>
      </div>
      <div class="laps-body" id="laps-body">
        <div class="empty-laps" id="laps-empty">NO LAPS RECORDED</div>
      </div>
    </div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
